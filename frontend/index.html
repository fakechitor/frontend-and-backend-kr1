<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Практика 1 — карточка товара (SCSS)</title>

    <link rel="stylesheet" href="./public/main.css" />
  </head>
  <body>
    <main class="page">
      <article class="product-card product-card--accent">
        <img src="./public/graphic-card.png" alt="Видеокарта RTX 5070" class="product-card__image" />
        <div class="product-card__content">
          
          <h1 class="product-card__title">Видеокарта RTX 5070</h1>
          <p class="product-card__desc">
            Мощная видеокарта для игр и работы с графикой. Поддержка трассировки лучей, высокая производительность и эффективное охлаждение.
          </p>

          <div class="product-card__footer">
            <span class="product-card__price">64 990 ₽</span>
            <a class="btn" href="#">Купить</a>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
